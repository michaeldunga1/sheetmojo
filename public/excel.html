<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Convert Excel files to JSON or CSV quickly with SheetMojo's Excel converter." />
  <meta name="keywords" content="Excel to JSON, Excel to CSV, spreadsheet converter, XLSX converter, online Excel tool" />
  <meta name="robots" content="index, follow" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Excel to JSON/CSV Converter — SheetMojo" />
  <meta property="og:description" content="Convert Excel files to JSON or CSV quickly with SheetMojo's Excel converter." />
  <meta property="og:site_name" content="SheetMojo" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Excel to JSON/CSV Converter — SheetMojo" />
  <meta name="twitter:description" content="Convert Excel files to JSON or CSV quickly with SheetMojo's Excel converter." />
  <link rel="canonical" href="/excel" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
  <main class="mx-auto max-w-5xl px-6 py-10 sm:px-8">
    <div class="mb-8 flex flex-wrap items-center justify-between gap-4">
      <a href="/" class="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-100">← Back to home</a>
      <div class="min-w-0 flex-1">
        <h1 class="text-3xl font-semibold tracking-tight text-slate-900 sm:text-4xl">Excel to JSON / CSV Converter</h1>
        <p class="mt-3 text-slate-600">Upload an Excel file and choose JSON or CSV output for fast export.</p>
      </div>
    </div>

    <div class="rounded-[2rem] border border-slate-200 bg-white p-8 shadow-2xl">
      <div class="grid gap-6">
        <div>
          <label class="block text-sm font-semibold text-slate-900" for="excel-file">Excel file</label>
          <input id="excel-file" type="file" accept=".xlsx,.xls" class="mt-3 w-full rounded-[1.5rem] border border-slate-200 bg-slate-50 px-4 py-3 text-slate-900 outline-none transition focus:border-sky-500 focus:ring-2 focus:ring-sky-200" />
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-900" for="output-format">Output format</label>
          <select id="output-format" class="mt-3 w-full rounded-[1.5rem] border border-slate-200 bg-slate-50 px-4 py-3 text-slate-900 outline-none transition focus:border-sky-500 focus:ring-2 focus:ring-sky-200">
            <option value="json">JSON</option>
            <option value="csv">CSV</option>
          </select>
        </div>

        <div class="flex flex-wrap gap-3">
          <button id="convert" disabled class="inline-flex items-center justify-center rounded-3xl bg-slate-900 px-6 py-3 text-sm font-semibold text-white transition hover:bg-slate-800 disabled:cursor-not-allowed disabled:opacity-50">Convert</button>
          <button id="download-result" disabled class="inline-flex items-center justify-center rounded-3xl border border-slate-200 bg-white px-6 py-3 text-sm font-semibold text-slate-900 transition hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-50">Download Result</button>
          <button id="clear" class="inline-flex items-center justify-center rounded-3xl border border-slate-200 bg-white px-6 py-3 text-sm font-semibold text-slate-900 transition hover:bg-slate-50">Clear</button>
        </div>

        <div class="rounded-[1.5rem] border border-slate-200 bg-slate-50 p-5">
          <p id="status" class="text-sm leading-6 text-slate-600">Select an Excel file and click Convert.</p>
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-900" for="output">Output</label>
          <textarea id="output" readonly class="mt-3 min-h-[260px] w-full rounded-[1.5rem] border border-slate-200 bg-white px-4 py-4 text-slate-900 outline-none"></textarea>
        </div>
      </div>
    </div>
  </main>
  <script src="/excel.js"></script>
</body>
</html>
