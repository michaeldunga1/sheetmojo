<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Convert CSV text into JSON objects instantly with SheetMojo's CSV-to-JSON tool." />
  <meta name="keywords" content="CSV to JSON, CSV converter, JSON generator, spreadsheet data, online CSV tool" />
  <meta name="robots" content="index, follow" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="CSV to JSON Converter — SheetMojo" />
  <meta property="og:description" content="Convert CSV text into JSON objects instantly with SheetMojo's CSV-to-JSON tool." />
  <meta property="og:site_name" content="SheetMojo" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="CSV to JSON Converter — SheetMojo" />
  <meta name="twitter:description" content="Convert CSV text into JSON objects instantly with SheetMojo's CSV-to-JSON tool." />
  <link rel="canonical" href="/csv-json" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
  <main class="mx-auto max-w-5xl px-6 py-10 sm:px-8">
    <div class="mb-8 flex flex-wrap items-center justify-between gap-4">
      <a href="/" class="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-100">← Back to home</a>
      <div class="min-w-0 flex-1">
        <h1 class="text-3xl font-semibold tracking-tight text-slate-900 sm:text-4xl">CSV to JSON Converter</h1>
        <p class="mt-3 text-slate-600">Paste CSV content and turn it into structured JSON output instantly.</p>
      </div>
    </div>

    <div class="rounded-[2rem] border border-slate-200 bg-white p-8 shadow-2xl">
      <div class="flex flex-wrap gap-3">
        <button id="convert" disabled class="inline-flex items-center justify-center rounded-3xl bg-slate-900 px-6 py-3 text-sm font-semibold text-white transition hover:bg-slate-800 disabled:cursor-not-allowed disabled:opacity-50">Convert</button>
        <button id="copy" disabled class="inline-flex items-center justify-center rounded-3xl border border-slate-200 bg-white px-6 py-3 text-sm font-semibold text-slate-900 transition hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-50">Copy JSON</button>
        <button id="clear" disabled class="inline-flex items-center justify-center rounded-3xl border border-slate-200 bg-white px-6 py-3 text-sm font-semibold text-slate-900 transition hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-50">Clear</button>
      </div>

      <div class="mt-8 grid gap-8">
        <div>
          <label class="block text-sm font-semibold text-slate-900" for="input">CSV Input</label>
          <textarea id="input" placeholder="Name,Age\nAlice,30\nBob,25" class="mt-3 min-h-[220px] w-full rounded-[1.5rem] border border-slate-200 bg-slate-50 px-4 py-4 text-slate-900 outline-none transition focus:border-sky-500 focus:ring-2 focus:ring-sky-200"></textarea>
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-900" for="output">JSON Output</label>
          <textarea id="output" readonly placeholder="Converted JSON appears here" class="mt-3 min-h-[220px] w-full rounded-[1.5rem] border border-slate-200 bg-slate-50 px-4 py-4 text-slate-900 outline-none"></textarea>
        </div>
      </div>
    </div>
  </main>
  <script src="/csv-json.js"></script>
</body>
</html>
