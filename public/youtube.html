<body class="min-h-screen bg-slate-50 text-slate-900">
  <main class="mx-auto max-w-4xl px-6 py-10 sm:px-8">
    <div class="mb-8 flex flex-wrap items-center justify-between gap-4">
      <a href="/" class="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-100">← Back to home</a>
      <div class="min-w-0 flex-1">
        <h1 class="text-3xl font-semibold tracking-tight text-slate-900 sm:text-4xl">YouTube to Audio / Video Converter</h1>
        <p class="mt-3 text-slate-600">Paste a YouTube link and choose whether to download audio or video.</p>
      </div>
    </div>

    <div class="rounded-[2rem] border border-slate-200 bg-white p-8 shadow-2xl">
      <label class="block text-sm font-semibold text-slate-900" for="youtube-url">YouTube URL</label>
      <input id="youtube-url" type="url" placeholder="https://www.youtube.com/watch?v=..." class="mt-3 w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 text-slate-900 outline-none transition focus:border-rose-500 focus:ring-2 focus:ring-rose-200" />

      <div class="mt-6 flex flex-wrap gap-3">
        <button id="download-audio" class="inline-flex items-center justify-center rounded-3xl bg-rose-600 px-6 py-3 text-sm font-semibold text-white transition hover:bg-rose-500">Download Audio</button>
        <button id="download-video" class="inline-flex items-center justify-center rounded-3xl bg-slate-900 px-6 py-3 text-sm font-semibold text-white transition hover:bg-slate-800">Download Video</button>
        <button id="clear" class="inline-flex items-center justify-center rounded-3xl border border-slate-200 bg-white px-6 py-3 text-sm font-semibold text-slate-900 transition hover:bg-slate-50">Clear</button>
      </div>

      <div class="mt-8 rounded-[1.5rem] border border-slate-200 bg-slate-50 p-5">
        <p id="status" class="text-sm leading-6 text-slate-600">Enter a YouTube URL first.</p>
        <a id="download-link" href="#" style="display:none;" class="mt-4 inline-flex rounded-3xl bg-slate-900 px-5 py-3 text-sm font-semibold text-white transition hover:bg-slate-800">Ready to download</a>
      </div>
