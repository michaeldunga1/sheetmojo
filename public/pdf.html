<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Convert any public web page to a polished PDF file with SheetMojo's page-to-PDF tool." />
  <meta name="keywords" content="web page to PDF, PDF converter, online PDF tool, page screenshot, PDF export" />
  <meta name="robots" content="index, follow" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Web Page to PDF Converter — SheetMojo" />
  <meta property="og:description" content="Convert any public web page to a polished PDF file with SheetMojo's page-to-PDF tool." />
  <meta property="og:site_name" content="SheetMojo" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Web Page to PDF Converter — SheetMojo" />
  <meta name="twitter:description" content="Convert any public web page to a polished PDF file with SheetMojo's page-to-PDF tool." />
  <link rel="canonical" href="/pdf" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
  <main class="mx-auto max-w-4xl px-6 py-10 sm:px-8">
    <div class="mb-8 flex flex-wrap items-center justify-between gap-4">
      <a href="/" class="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-100">← Back to home</a>
      <div class="min-w-0 flex-1">
        <h1 class="text-3xl font-semibold tracking-tight text-slate-900 sm:text-4xl">Web Page to PDF Converter</h1>
        <p class="mt-3 text-slate-600">Paste a public web page URL and generate a beautifully rendered PDF.</p>
      </div>
    </div>

    <div class="rounded-[2rem] border border-slate-200 bg-white p-8 shadow-2xl">
      <label class="block text-sm font-semibold text-slate-900" for="page-url">Page URL</label>
      <input id="page-url" type="url" placeholder="https://example.com" class="mt-3 w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 text-slate-900 outline-none transition focus:border-sky-500 focus:ring-2 focus:ring-sky-200" />

      <div class="mt-6 flex flex-wrap gap-3">
        <button id="convert" class="inline-flex items-center justify-center rounded-3xl bg-slate-900 px-6 py-3 text-sm font-semibold text-white transition hover:bg-slate-800">Generate PDF</button>
        <button id="clear" class="inline-flex items-center justify-center rounded-3xl border border-slate-200 bg-white px-6 py-3 text-sm font-semibold text-slate-900 transition hover:bg-slate-50">Clear</button>
      </div>

      <div class="mt-8 rounded-[1.5rem] border border-slate-200 bg-slate-50 p-5">
        <p id="status" class="text-sm leading-6 text-slate-600">Enter a URL and click Generate PDF.</p>
        <a id="download-link" href="#" style="display:none;" class="mt-4 inline-flex rounded-3xl bg-slate-900 px-5 py-3 text-sm font-semibold text-white transition hover:bg-slate-800">Download PDF</a>
      </div>
    </div>
  </main>
  <script src="/pdf.js"></script>
</body>
</html>
