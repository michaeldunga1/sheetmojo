<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Count words, sentences, and paragraphs quickly with SheetMojo's word counter." />
  <meta name="keywords" content="word counter, sentence counter, paragraph counter, online text tools" />
  <meta name="robots" content="index, follow" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Word Counter — SheetMojo" />
  <meta property="og:description" content="Count words, sentences, and paragraphs quickly with SheetMojo's word counter." />
  <meta property="og:site_name" content="SheetMojo" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Word Counter — SheetMojo" />
  <meta name="twitter:description" content="Count words, sentences, and paragraphs quickly with SheetMojo's word counter." />
  <link rel="canonical" href="/word-counter" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
  <main class="mx-auto max-w-4xl px-6 py-10 sm:px-8">
    <div class="mb-8 flex flex-wrap items-center justify-between gap-4">
      <a href="/" class="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-100">← Back to home</a>
      <div class="min-w-0 flex-1">
        <h1 class="text-3xl font-semibold tracking-tight text-slate-900 sm:text-4xl">Word Counter</h1>
        <p class="mt-3 text-slate-600">Count words, sentences, and paragraphs quickly with a simple editor.</p>
      </div>
    </div>

    <div class="rounded-[2rem] border border-slate-200 bg-white p-8 shadow-2xl">
      <label class="block text-sm font-semibold text-slate-900" for="word-text">Text</label>
      <textarea id="word-text" placeholder="Paste your text here" class="mt-3 min-h-[240px] w-full rounded-[1.5rem] border border-slate-200 bg-slate-50 px-4 py-4 text-slate-900 outline-none transition focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200"></textarea>

      <div class="mt-8 grid gap-4 rounded-[1.5rem] border border-slate-200 bg-slate-50 p-6 sm:grid-cols-3">
        <div>
          <p class="text-sm text-slate-500">Words</p>
          <p class="mt-2 text-2xl font-semibold text-slate-900" id="word-count">0</p>
        </div>
        <div>
          <p class="text-sm text-slate-500">Sentences</p>
          <p class="mt-2 text-2xl font-semibold text-slate-900" id="sentence-count">0</p>
        </div>
        <div>
          <p class="text-sm text-slate-500">Paragraphs</p>
          <p class="mt-2 text-2xl font-semibold text-slate-900" id="paragraph-count">0</p>
        </div>
      </div>
    </div>
  </main>
  <script src="/word-counter.js"></script>
</body>
</html>
