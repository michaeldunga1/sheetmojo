{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SheetMojo{% endblock %}</title>
    
    <!-- Material Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    
    <!-- Materialize CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'business_listing/style.css' %}">
    <script type='text/javascript' src='https://platform-api.sharethis.com/js/sharethis.js#property=69cab36bf3c85d8d850896ad&product=sop' async='async'></script>
    {% block extra_head %}{% endblock %}
</head>
<body>

    {% include 'business_listing/navbar.html' %}

    <main>
        <div class="container" style="margin-top: 30px;">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- Materialize JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize Materialize components
            var sidenavElems = document.querySelectorAll('.sidenav');
            M.Sidenav.init(sidenavElems);

            // You can add more initializations here (modals, dropdowns, etc.)
            // M.Modal.init(document.querySelectorAll('.modal'));
            // M.Dropdown.init(document.querySelectorAll('.dropdown-trigger'));
        });
    </script>

    {% block extra_js %}{% endblock %}

</body>
</html>
