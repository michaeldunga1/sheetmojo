{% extends "base.html" %}
{% block title %}Tags{% endblock %}
{% block content %}
<section class="mx-auto max-w-6xl">
  <div class="overflow-hidden rounded-[2rem] border border-slate-200 bg-white shadow-sm">

    <div class="bg-gradient-to-br from-emerald-100 via-white to-teal-100 px-6 py-10 sm:px-8">
      <p class="text-sm font-semibold uppercase tracking-[0.18em] text-emerald-700">Browse</p>
      <h1 class="mt-3 text-3xl font-bold tracking-tight text-slate-900 sm:text-4xl">Tags</h1>
      <p class="mt-2 text-slate-600">{{ tags|length }} unique tag{{ tags|length|pluralize }}. Click any tag to see matching calculators.</p>
    </div>

    <div class="px-6 py-8 sm:px-8">
      <div class="flex flex-wrap gap-2">
        {% for tag, count in tags %}
          <a
            href="{% url 'calculator-directory' %}?tag={{ tag|urlencode }}"
            class="inline-flex items-center gap-1.5 rounded-full border border-emerald-200 bg-emerald-50 px-3 py-1.5 text-sm font-medium text-emerald-800 transition hover:border-emerald-400 hover:bg-emerald-100"
          >
            {{ tag }}
            <span class="rounded-full bg-emerald-200 px-1.5 py-0.5 text-xs font-semibold text-emerald-900">{{ count }}</span>
          </a>
        {% endfor %}
      </div>
    </div>

  </div>
</section>
{% endblock %}
