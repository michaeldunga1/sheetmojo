{% extends 'base.html' %}
{% block title %}Delete Calculator{% endblock %}
{% block content %}
<section class="mx-auto max-w-2xl rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
  <h1 class="text-2xl font-semibold text-slate-900">Delete Calculator</h1>
  <p class="mt-3 text-sm text-slate-700">
    Are you sure you want to delete <span class="font-semibold">{{ calculator.calculator_name }}</span>?
    This action cannot be undone.
  </p>

  <form method="post" class="mt-6 flex gap-3">
    {% csrf_token %}
    <button type="submit" class="rounded-lg border border-red-300 bg-red-50 px-4 py-2 text-sm font-medium text-red-700 hover:bg-red-100">
      Yes, Delete
    </button>
    <a href="{% url 'calculator-list' %}" class="rounded-lg border border-slate-300 px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50">
      Cancel
    </a>
  </form>
</section>
{% endblock %}
