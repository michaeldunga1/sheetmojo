{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<section class="max-w-md rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
  <h1 class="text-xl font-semibold">Login</h1>
  <form method="post" class="mt-4 space-y-3">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="rounded-lg bg-slate-900 text-white px-4 py-2">Sign in</button>
  </form>
  <p class="mt-3 text-sm"><a class="underline" href="{% url 'password_reset' %}">Forgot password?</a></p>
</section>
{% endblock %}
