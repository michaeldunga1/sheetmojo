{% extends 'blog/base.html' %}

{% block content %}
<header class="page-headline editor-shell">
  <p class="post-kicker mb-2">Danger Zone</p>
  <h1 class="title is-3 mb-2">
    <span class="icon mr-2"><i class="fa-solid fa-triangle-exclamation"></i></span>
    <span>Delete Account</span>
  </h1>
  <p class="page-kicker">This action is permanent and removes your account plus all related content.</p>
</header>

<div class="editor-form-card editor-shell">
  <div class="danger-panel mb-4">Your account and all related content will be deleted permanently.</div>
  <form method="post" class="inline-actions is-flex is-align-items-center is-flex-wrap-wrap">
    {% csrf_token %}
    <button class="button is-danger" type="submit">
      <span class="icon"><i class="fa-solid fa-user-xmark"></i></span>
      <span>Yes, delete my account</span>
    </button>
    <a class="button is-light" href="{% url 'blog:profile' %}" hx-boost="true">
      <span class="icon"><i class="fa-solid fa-arrow-left"></i></span>
      <span>Cancel</span>
    </a>
  </form>
</div>
{% endblock %}
