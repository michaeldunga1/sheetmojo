{% extends 'blog/base.html' %}

{% block content %}
<h1 class="title is-3">
  <span class="icon mr-2"><i class="fa-solid fa-triangle-exclamation"></i></span>
  <span>Delete Account</span>
</h1>

<div class="notification is-danger is-light">
  This action is permanent. Your account and all related content will be deleted.
</div>

<form method="post" class="inline-actions">
  {% csrf_token %}
  <button class="button is-danger" type="submit">
    <span class="icon"><i class="fa-solid fa-user-xmark"></i></span>
    <span>Yes, delete my account</span>
  </button>
  <a class="button is-light" href="{% url 'blog:profile' %}">
    <span class="icon"><i class="fa-solid fa-arrow-left"></i></span>
    <span>Cancel</span>
  </a>
</form>
{% endblock %}
