{% extends 'blog/base.html' %}

{% block content %}
<h1 class="title is-3"><span class="icon mr-2"><i class="fa-solid fa-trash"></i></span><span>Delete Comment</span></h1>
<div class="notification is-warning is-light"><span class="icon mr-2"><i class="fa-solid fa-triangle-exclamation"></i></span>Delete this comment?</div>
<form method="post">
  {% csrf_token %}
  <button class="button is-danger" type="submit">
    <span class="icon"><i class="fa-solid fa-trash"></i></span>
    <span>Confirm delete</span>
  </button>
</form>
{% endblock %}
