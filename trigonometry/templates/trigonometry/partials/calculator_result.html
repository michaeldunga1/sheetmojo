{% if form.non_field_errors %}
  <div class="rounded-xl border border-rose-200 bg-rose-50 p-3 text-sm text-rose-800">
    {{ form.non_field_errors|striptags }}
  </div>
{% elif result %}
  <div class="rounded-xl border border-purple-200 bg-purple-50 p-4">
    <h3 class="text-sm font-semibold">Step-by-step</h3>
    <ol class="mt-2 list-decimal space-y-2 pl-5 text-sm">
      {% for label, value in result.steps %}
        <li>
          <span class="font-medium">{{ label }}:</span>
          <span class="ml-1 text-slate-700">{{ value }}</span>
        </li>
      {% endfor %}
    </ol>
  </div>
{% else %}
  <div class="rounded-xl border border-slate-200 bg-white p-4 text-sm text-slate-600">
    Enter values and click <strong>Compute</strong> to see the derivation steps.
  </div>
{% endif %}
