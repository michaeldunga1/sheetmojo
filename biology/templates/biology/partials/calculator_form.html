<div class="space-y-6">
  <div class="space-y-2">
    <p class="text-sm font-semibold uppercase tracking-[0.25em] text-emerald-700">Active Formula</p>
    <h3 class="text-2xl font-bold text-slate-900">{{ formula.title }}</h3>
    <p class="text-sm text-slate-500">\({{ formula.latex }}\)</p>
  </div>

  <form
    class="space-y-4"
    hx-post="{% url 'biology:calculate' formula_slug %}"
    hx-target="#calculator-result"
    hx-swap="innerHTML"
  >
    {% csrf_token %}
    {% for field in form %}
      <div class="space-y-2">
        <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-slate-700">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}
          <div class="text-sm text-rose-600">{{ field.errors|join:', ' }}</div>
        {% endif %}
      </div>
    {% endfor %}
    <button type="submit" class="inline-flex items-center justify-center rounded-full bg-slate-900 px-5 py-3 text-sm font-semibold text-white transition hover:bg-emerald-700">Calculate</button>
  </form>

  <div id="calculator-result" role="status" aria-live="polite" aria-atomic="true" tabindex="-1">
    {% include 'biology/partials/calculator_result.html' %}
  </div>
</div>
