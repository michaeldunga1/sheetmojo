<div class="rounded-xl border border-slate-200 bg-slate-50 p-5">
  <h2 class="text-lg font-semibold">{{ formula.title }}</h2>
  <div class="mt-2 rounded-lg bg-white p-3 text-sm text-slate-700">
    <div data-katex="{{ formula.latex|escape }}"></div>
  </div>

  <form
    class="mt-4 grid gap-4 md:grid-cols-2"
    hx-post="{% url 'mathematics:calculate' slug=formula_slug %}"
    hx-target="#calculator-result"
    hx-swap="innerHTML"
  >
    {% csrf_token %}
    {% if form.non_field_errors %}
      <div class="md:col-span-2 rounded-lg border border-rose-200 bg-rose-50 p-3 text-sm text-rose-800">
        {{ form.non_field_errors|striptags }}
      </div>
    {% endif %}
    {% for field in form %}
      <div>
        <label class="block text-sm font-medium" for="{{ field.id_for_label }}">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}
          <p class="mt-1 text-sm text-rose-700">{{ field.errors|striptags }}</p>
        {% endif %}
      </div>
    {% endfor %}
    <div class="md:col-span-2">
      <button type="submit" class="rounded-lg bg-violet-700 px-5 py-2 text-white hover:bg-violet-800">Compute</button>
    </div>
  </form>

  <div id="calculator-result" class="mt-4" role="status" aria-live="polite" aria-atomic="true" tabindex="-1">
    {% include "mathematics/partials/calculator_result.html" %}
  </div>
</div>
